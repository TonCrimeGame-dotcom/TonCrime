
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TonCrime Withdraw Admin</title>
  <style>
    body { font-family: system-ui, Arial; margin: 0; background: #0b0f16; color: #fff; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .toolbar, .card { background: #121a26; border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 16px; }
    .toolbar { display: grid; grid-template-columns: 1fr 180px 180px 120px; gap: 12px; align-items: end; margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: rgba(255,255,255,.7); margin-bottom: 6px; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid rgba(255,255,255,.12); background: #0e141f; color: #fff; padding: 10px 12px; }
    button { cursor: pointer; background: linear-gradient(180deg, #224a9e, #16356f); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.08); text-align: left; vertical-align: top; }
    .actions { display: flex; gap: 8px; }
    .gold { background: linear-gradient(180deg, #8a6620, #6b4e17); }
    .red { background: linear-gradient(180deg, #8c2734, #671d28); }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; border:1px solid rgba(255,255,255,.1); }
    .pending { background:#403315; color:#ffd98c; }
    .approved { background:#16304d; color:#8dc7ff; }
    .paid { background:#17351e; color:#98ffb2; }
    .rejected { background:#40181d; color:#ff9ba8; }
    .muted { color: rgba(255,255,255,.65); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div>
        <label>Backend URL</label>
        <input id="backendUrl" value="http://localhost:8787" />
      </div>
      <div>
        <label>Admin Key</label>
        <input id="adminKey" type="password" />
      </div>
      <div>
        <label>Durum</label>
        <select id="status">
          <option value="pending">pending</option>
          <option value="approved">approved</option>
          <option value="paid">paid</option>
          <option value="rejected">rejected</option>
          <option value="all">all</option>
        </select>
      </div>
      <div>
        <button id="loadBtn">Yükle</button>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Kullanıcı</th>
            <th>Cüzdan</th>
            <th>Tutar</th>
            <th>Durum</th>
            <th>Tarih</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

<script>
const rows = document.getElementById('rows');
const loadBtn = document.getElementById('loadBtn');

function pill(status) {
  return `<span class="pill ${status}">${status}</span>`;
}

async function api(path, options = {}) {
  const base = document.getElementById('backendUrl').value.trim();
  const key = document.getElementById('adminKey').value.trim();
  const res = await fetch(base + path, {
    ...options,
    headers: {
      'content-type': 'application/json',
      'x-admin-key': key,
      ...(options.headers || {})
    }
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

async function loadRows() {
  rows.innerHTML = `<tr><td colspan="6" class="muted">Yükleniyor...</td></tr>`;
  try {
    const status = document.getElementById('status').value;
    const data = await api(`/withdraws?status=${encodeURIComponent(status)}`);
    const items = data.items || [];
    if (!items.length) {
      rows.innerHTML = `<tr><td colspan="6" class="muted">Kayıt yok</td></tr>`;
      return;
    }

    rows.innerHTML = items.map(item => `
      <tr>
        <td>
          <div><strong>${item.username || '-'}</strong></div>
          <div class="muted">${item.telegram_id || ''}</div>
        </td>
        <td>${item.wallet_address}</td>
        <td>
          <div>${item.yton_amount} YTON</div>
          <div class="muted">${item.ton_amount} TON</div>
        </td>
        <td>${pill(item.status)}</td>
        <td>${new Date(item.created_at).toLocaleString('tr-TR')}</td>
        <td>
          <div class="actions">
            <button onclick="approveRow('${item.id}')">Onayla</button>
            <button class="gold" onclick="payRow('${item.id}')">Öde</button>
            <button class="red" onclick="rejectRow('${item.id}')">Reddet</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    rows.innerHTML = `<tr><td colspan="6" class="muted">${err.message}</td></tr>`;
  }
}

async function approveRow(id) {
  const admin_note = prompt('Admin notu:', '') ?? '';
  await api(`/withdraws/${id}/approve`, {
    method: 'POST',
    body: JSON.stringify({ admin_note })
  });
  loadRows();
}

async function rejectRow(id) {
  const admin_note = prompt('Red notu:', 'Rejected by admin') ?? 'Rejected by admin';
  await api(`/withdraws/${id}/reject`, {
    method: 'POST',
    body: JSON.stringify({ admin_note })
  });
  loadRows();
}

async function payRow(id) {
  if (!confirm('Bu çekimi ödemek istiyor musun?')) return;
  await api(`/withdraws/${id}/pay`, {
    method: 'POST',
    body: JSON.stringify({})
  });
  loadRows();
}

loadBtn.addEventListener('click', loadRows);
loadRows();
</script>
</body>
</html>
