<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TonCrime Admin</title>
  <style>
    body{margin:0;background:#0b1017;color:#fff;font-family:system-ui,Arial,sans-serif}
    .wrap{max-width:1320px;margin:20px auto;padding:0 16px}
    .toolbar,.card{background:#121a26;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px}
    .toolbar{display:grid;grid-template-columns:1.2fr 1fr 180px 120px;gap:12px;align-items:end;margin-bottom:16px}
    .tabs{display:flex;gap:8px;margin-bottom:16px}
    .tabs button{width:auto;padding:10px 16px}
    .hidden{display:none}
    label{display:block;font-size:12px;color:rgba(255,255,255,.72);margin-bottom:6px}
    input,select,button{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#0e141f;color:#fff;padding:10px 12px}
    button{cursor:pointer;font-weight:800;background:linear-gradient(180deg,#244d9c,#17356f)}
    .gold{background:linear-gradient(180deg,#8a6520,#664a17)}
    .red{background:linear-gradient(180deg,#912b38,#671d28)}
    .green{background:linear-gradient(180deg,#1f7f59,#165941)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;text-align:left;vertical-align:top}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.1)}
    .pending{background:#402f13;color:#ffd98c}
    .paid{background:#18331d;color:#9affb0}
    .rejected{background:#40181d;color:#ff9aa7}
    .statusbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .miniInput{min-width:84px;padding:8px 10px;font-size:13px}
    .inlineInputs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .muted{font-size:12px;color:rgba(255,255,255,.62)}
    .tableMeta{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px;color:rgba(255,255,255,.72);font-size:13px}
    .tableMeta strong{color:#fff}
    .tableHint{font-size:12px;color:rgba(255,255,255,.52)}
    @media (max-width: 960px){
      .toolbar{grid-template-columns:1fr}
      .wrap{padding:0 10px}
      th,td{font-size:13px}
      .tableMeta{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="statusbar">
      <h2>TonCrime Admin Panel</h2>
      <div id="statusText">Hazir</div>
    </div>

    <div class="toolbar">
      <div>
        <label>Backend URL</label>
        <input id="backendUrl" value="http://localhost:8787" />
      </div>
      <div>
        <label>Admin Key</label>
        <input id="adminKey" type="password" />
      </div>
      <div>
        <label>Filtre / Arama</label>
        <input id="queryInput" placeholder="status veya kullanici ara" />
      </div>
      <div>
        <button id="reloadBtn">Yukle</button>
      </div>
    </div>

    <div class="tabs">
      <button id="tabWithdraws">Cekimler</button>
      <button id="tabProfiles">Profiller</button>
    </div>

    <div id="withdrawsView" class="card">
      <div class="tableMeta">
        <div id="withdrawMeta"><strong>Cekimler</strong></div>
        <div class="tableHint">Durum, kullanici, telegram id veya cuzdan ile ara</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Kullanici</th>
            <th>Cuzdan</th>
            <th>Tutar</th>
            <th>Durum</th>
            <th>Tarih</th>
            <th>Islem</th>
          </tr>
        </thead>
        <tbody id="withdrawRows"></tbody>
      </table>
    </div>

    <div id="profilesView" class="card hidden">
      <div class="tableMeta">
        <div id="profileMeta"><strong>Profiller</strong></div>
        <div class="tableHint">Kullanici adi, telegram id veya profil id ile aninda ara</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Kullanici</th>
            <th>Telegram</th>
            <th>Level</th>
            <th>YTON</th>
            <th>Enerji / Max</th>
            <th>Islem</th>
          </tr>
        </thead>
        <tbody id="profileRows"></tbody>
      </table>
    </div>
  </div>

<script>
const backendUrl = document.getElementById('backendUrl');
const adminKey = document.getElementById('adminKey');
const queryInput = document.getElementById('queryInput');
const reloadBtn = document.getElementById('reloadBtn');
const withdrawRows = document.getElementById('withdrawRows');
const profileRows = document.getElementById('profileRows');
const withdrawMeta = document.getElementById('withdrawMeta');
const profileMeta = document.getElementById('profileMeta');
const statusText = document.getElementById('statusText');
const withdrawsView = document.getElementById('withdrawsView');
const profilesView = document.getElementById('profilesView');
const tabWithdraws = document.getElementById('tabWithdraws');
const tabProfiles = document.getElementById('tabProfiles');

let activeTab = 'withdraws';
let lastPendingCount = 0;
let queryDebounce = 0;

function setQueryPlaceholder() {
  queryInput.placeholder = activeTab === 'profiles'
    ? 'kullanici, telegram id veya profil id ara'
    : 'status, kullanici, telegram id veya cuzdan ara';
}

function setStatus(text) {
  statusText.textContent = text;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(value) {
  if (!value) return '-';
  const date = new Date(value);
  if (!Number.isFinite(date.getTime())) return '-';
  return date.toLocaleString('tr-TR');
}

function parseNumberInput(id, fallback = 0) {
  const el = document.getElementById(id);
  const num = Number(el?.value ?? fallback);
  return Number.isFinite(num) ? num : fallback;
}

function updateMeta(target, title, count, query = '') {
  const countText = `${count} kayit`;
  const suffix = query ? ` · arama: ${query}` : '';
  target.innerHTML = `<strong>${escapeHtml(title)}</strong> <span class="muted">${escapeHtml(countText + suffix)}</span>`;
}

function scoreProfileMatch(item, query) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return 0;
  const username = String(item?.username || '').toLowerCase();
  const telegramId = String(item?.telegram_id || '').toLowerCase();
  const profileId = String(item?.id || '').toLowerCase();
  let score = 0;
  if (telegramId === q) score += 500;
  if (profileId === q) score += 450;
  if (username === q) score += 400;
  if (telegramId.startsWith(q)) score += 220;
  if (profileId.startsWith(q)) score += 200;
  if (username.startsWith(q)) score += 180;
  if (telegramId.includes(q)) score += 120;
  if (profileId.includes(q)) score += 110;
  if (username.includes(q)) score += 100;
  return score;
}

function triggerReload() {
  if (activeTab === 'withdraws') return loadWithdraws();
  return loadProfiles();
}

function scheduleReload(delay = 250) {
  clearTimeout(queryDebounce);
  queryDebounce = window.setTimeout(() => {
    triggerReload();
  }, delay);
}

async function api(path, options = {}) {
  const res = await fetch(backendUrl.value.trim() + path, {
    ...options,
    headers: {
      'content-type': 'application/json',
      'x-admin-key': adminKey.value.trim(),
      ...(options.headers || {})
    }
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Istek basarisiz');
  return json;
}

function pill(status) {
  return `<span class="pill ${escapeHtml(status)}">${escapeHtml(status)}</span>`;
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.value = 0.06;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    setTimeout(() => { osc.stop(); ctx.close(); }, 180);
  } catch (_) {}
}

async function loadWithdraws() {
  withdrawRows.innerHTML = '<tr><td colspan="6">Yukleniyor...</td></tr>';
  updateMeta(withdrawMeta, 'Cekimler', 0, queryInput.value.trim());
  try {
    const rawQ = queryInput.value.trim();
    const status = ['pending', 'paid', 'rejected', 'all'].includes(rawQ) ? rawQ : 'all';
    const data = await api(`/withdraws?status=${encodeURIComponent(status)}`);
    let items = data.items || [];
    if (rawQ && !['pending', 'paid', 'rejected', 'all'].includes(rawQ)) {
      const q = rawQ.toLowerCase();
      items = items.filter((x) =>
        String(x.username || '').toLowerCase().includes(q) ||
        String(x.telegram_id || '').toLowerCase().includes(q) ||
        String(x.wallet_address || '').toLowerCase().includes(q)
      );
    }
    const pendingCount = items.filter((x) => x.status === 'pending').length;
    if (pendingCount > lastPendingCount) playBeep();
    lastPendingCount = pendingCount;
    updateMeta(withdrawMeta, 'Cekimler', items.length, rawQ);

    if (!items.length) {
      withdrawRows.innerHTML = '<tr><td colspan="6">Kayit yok</td></tr>';
      return;
    }

    withdrawRows.innerHTML = items.map((item) => `
      <tr>
        <td>
          <div><strong>${escapeHtml(item.username || '-')}</strong></div>
          <div>${escapeHtml(item.telegram_id || '')}</div>
        </td>
        <td>
          <div>${escapeHtml(item.wallet_address || '')}</div>
          <div>${escapeHtml(item.tx_hash || '')}</div>
        </td>
        <td>
          <div>${escapeHtml(item.yton_amount)} YTON</div>
          <div>${escapeHtml(item.ton_amount)} TON</div>
        </td>
        <td>${pill(item.status || '')}</td>
        <td>${escapeHtml(formatDate(item.created_at))}</td>
        <td>
          ${item.status === 'pending' ? `
            <div class="actions">
              <button class="gold" onclick="payRow('${item.id}')">Onayla ve Ode</button>
              <button class="red" onclick="rejectRow('${item.id}')">Reddet</button>
            </div>
          ` : 'Tamamlandi'}
        </td>
      </tr>
    `).join('');
  } catch (err) {
    withdrawRows.innerHTML = `<tr><td colspan="6">${escapeHtml(err.message)}</td></tr>`;
  }
}

async function loadProfiles() {
  profileRows.innerHTML = '<tr><td colspan="6">Yukleniyor...</td></tr>';
  updateMeta(profileMeta, 'Profiller', 0, queryInput.value.trim());
  try {
    const rawQ = queryInput.value.trim();
    const profileLimit = rawQ ? 250 : 120;
    const data = await api(`/profiles?limit=${profileLimit}&query=${encodeURIComponent(rawQ)}`);
    const items = (data.items || []).sort((left, right) =>
      scoreProfileMatch(right, rawQ) - scoreProfileMatch(left, rawQ)
    );
    updateMeta(profileMeta, 'Profiller', items.length, rawQ);
    if (!items.length) {
      profileRows.innerHTML = '<tr><td colspan="6">Kayit yok</td></tr>';
      return;
    }

    profileRows.innerHTML = items.map((item) => `
      <tr>
        <td>
          <div><strong>${escapeHtml(item.username || '-')}</strong></div>
          <div class="muted">${escapeHtml(formatDate(item.updated_at || item.created_at))}</div>
        </td>
        <td>${escapeHtml(item.telegram_id || '')}</td>
        <td>
          <input class="miniInput" id="pf-level-${item.id}" type="number" min="0" max="9999" value="${Number(item.level || 0)}" />
        </td>
        <td>
          <input class="miniInput" id="pf-coins-${item.id}" type="number" min="0" max="999999999" value="${Number(item.coins || 0)}" />
        </td>
        <td>
          <div class="inlineInputs">
            <input class="miniInput" id="pf-energy-${item.id}" type="number" min="0" max="500" value="${Number(item.energy || 0)}" />
            <span>/</span>
            <input class="miniInput" id="pf-energy-max-${item.id}" type="number" min="1" max="500" value="${Number(item.energy_max || 100)}" />
          </div>
        </td>
        <td>
          <div class="actions">
            <button class="green" onclick="saveProfile('${item.id}')">Kaydet</button>
            <button class="gold" onclick="resetEnergy('${item.id}')">50 / 50</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    profileRows.innerHTML = `<tr><td colspan="6">${escapeHtml(err.message)}</td></tr>`;
  }
}

async function payRow(id) {
  if (!confirm('Bu talebi onaylayip odemek istiyor musun?')) return;
  try {
    setStatus('Odeme gonderiliyor...');
    await api(`/withdraws/${id}/pay`, { method: 'POST', body: JSON.stringify({}) });
    setStatus('Odeme tamamlandi');
    loadWithdraws();
  } catch (err) {
    alert(err.message);
    setStatus('Odeme hatasi');
  }
}

async function rejectRow(id) {
  const admin_note = prompt('Red notu:', 'Rejected by admin');
  if (admin_note === null) return;
  try {
    await api(`/withdraws/${id}/reject`, {
      method: 'POST',
      body: JSON.stringify({ admin_note })
    });
    setStatus('Istek reddedildi');
    loadWithdraws();
  } catch (err) {
    alert(err.message);
  }
}

async function resetEnergy(id) {
  if (!confirm('Bu kullanicinin enerjisini 50 / 50 yapmak istiyor musun?')) return;
  try {
    await api(`/profiles/${id}/reset-energy`, {
      method: 'POST',
      body: JSON.stringify({ energy: 50 })
    });
    setStatus('Enerji 50 / 50 yapildi');
    loadProfiles();
  } catch (err) {
    alert(err.message);
  }
}

async function saveProfile(id) {
  const level = Math.max(0, Math.floor(parseNumberInput(`pf-level-${id}`, 0)));
  const coins = Math.max(0, Math.floor(parseNumberInput(`pf-coins-${id}`, 0)));
  const energyMax = Math.max(1, Math.floor(parseNumberInput(`pf-energy-max-${id}`, 100)));
  const energy = Math.max(0, Math.min(energyMax, Math.floor(parseNumberInput(`pf-energy-${id}`, energyMax))));

  const energyInput = document.getElementById(`pf-energy-${id}`);
  const energyMaxInput = document.getElementById(`pf-energy-max-${id}`);
  if (energyInput) energyInput.value = String(energy);
  if (energyMaxInput) energyMaxInput.value = String(energyMax);

  try {
    setStatus('Profil kaydediliyor...');
    await api(`/profiles/${id}/update`, {
      method: 'POST',
      body: JSON.stringify({
        level,
        coins,
        yton: coins,
        energy,
        energy_max: energyMax
      })
    });
    setStatus('Profil guncellendi');
    loadProfiles();
  } catch (err) {
    alert(err.message);
    setStatus('Profil guncelleme hatasi');
  }
}

function showTab(name) {
  activeTab = name;
  setQueryPlaceholder();
  withdrawsView.classList.toggle('hidden', name !== 'withdraws');
  profilesView.classList.toggle('hidden', name !== 'profiles');
  if (name === 'withdraws') loadWithdraws();
  if (name === 'profiles') loadProfiles();
}

tabWithdraws.addEventListener('click', () => showTab('withdraws'));
tabProfiles.addEventListener('click', () => showTab('profiles'));
reloadBtn.addEventListener('click', () => triggerReload());
queryInput.addEventListener('input', () => scheduleReload(activeTab === 'profiles' ? 180 : 260));
queryInput.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') {
    event.preventDefault();
    clearTimeout(queryDebounce);
    triggerReload();
  }
  if (event.key === 'Escape') {
    queryInput.value = '';
    clearTimeout(queryDebounce);
    triggerReload();
  }
});

setInterval(() => {
  if (activeTab === 'withdraws') loadWithdraws();
}, 10000);

setQueryPlaceholder();
showTab('withdraws');
</script>
</body>
</html>
