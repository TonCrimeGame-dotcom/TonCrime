<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>TonCrime</title>

  <!-- 404 favicon hatasını keser -->
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b0b0f'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='30' fill='white' font-family='Arial'%3ETC%3C/text%3E%3C/svg%3E"
  />

  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #0b0b0f;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #game {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 1;
    }

    #safe {
      position: fixed;
      left: var(--sal);
      top: var(--sat);
      right: var(--sar);
      bottom: var(--sab);
      pointer-events: none;
      z-index: 2;
    }

    /* ===== CHAT ===== */
    #chatDrawer {
      position: fixed;
      left: var(--sal);
      right: var(--sar);
      bottom: var(--sab);
      height: min(42vh, 360px);
      transform: translateY(calc(100% - 44px));
      transition: transform 220ms ease;
      z-index: 9999;
      pointer-events: auto;
    }

    #chatDrawer, #chatDrawer * {
      touch-action: auto;
      -webkit-user-select: none;
      user-select: none;
    }

    #chatDrawer.open { transform: translateY(0); }

    #chatHeader {
      height: 44px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 0 12px;
      background: rgba(0,0,0,0.72);
      border-top: 1px solid rgba(255,255,255,0.14);
      border-left: 1px solid rgba(255,255,255,0.10);
      border-right: 1px solid rgba(255,255,255,0.10);
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
      backdrop-filter: blur(6px);
    }

    #chatTitle {
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    #chatToggle {
      appearance:none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      border-radius: 10px;
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
      cursor:pointer;
    }

    #chatBody {
      height: calc(100% - 44px);
      background: rgba(0,0,0,0.62);
      border-left: 1px solid rgba(255,255,255,0.10);
      border-right: 1px solid rgba(255,255,255,0.10);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      border-bottom-left-radius: 14px;
      border-bottom-right-radius: 14px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      backdrop-filter: blur(6px);
    }

    #chatMessages {
      flex:1;
      overflow-y:auto;
      padding: 10px 10px 6px;
    }

    .msg {
      margin: 6px 0;
      display:flex;
      gap:8px;
      align-items:baseline;
      color: rgba(255,255,255,0.92);
      font-size:13px;
      line-height:1.25;
      word-break:break-word;
    }

    .msg .meta {
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      min-width: 56px;
    }

    #chatInputRow {
      display:flex;
      gap:8px;
      padding: 8px;
      border-top: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.30);
    }

    #chatInput {
      flex:1;
      height:34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 0 10px;
      outline:none;
      font-size: 13px;
      user-select:text;
      -webkit-user-select:text;
    }

    #chatSend {
      width:74px;
      height:34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      cursor:pointer;
    }

  
  
  </style>
  <link rel="stylesheet" href="./src/ui/Hud.css" />
</head>

<body>
  <canvas id="game"></canvas>

<div id="safe"></div>
<div id="hudTop">
  <div id="hudShell" class="hudPanel">
    <div id="hudRow">
      <div id="hudLeft">
        <div id="hudIdentity">
          <div id="hudAvatarWrap">
            <div id="hudAvatar">
              <img id="hudAvatarImg" alt="avatar" />
              <div id="hudAvatarFallback">P</div>
            </div>
            <div id="hudOnlineBadge" title="Online"></div>
            <div id="hudPremiumBadge" title="Premium">★</div>
          </div>

          <div id="hudIdentityText">
            <div class="line1" id="hudUsername">Player</div>
            <div class="line2">
              <span class="hudMiniIcon">Y</span>
              <span id="hudCoins">YTON 0</span>
            </div>
            <div class="line3">
              <span class="hudMiniIcon">⚔</span>
              <span id="hudWeaponName">Silah Yok</span>
              <small id="hudWeaponBonus"></small>
            </div>
          </div>
        </div>
      </div>

      <div id="hudCenter">
        <img id="hudLogo" src="./src/assets/logo.png" alt="TonCrime" />
      </div>

      <div id="hudRight">
        <div class="bar">
          <div class="barFill" id="hudXpFill"></div>
          <div class="barText" id="hudXpText">LVL 1 • 0/100</div>
        </div>

        <div class="bar">
          <div class="barFill" id="hudEnergyFill"></div>
          <div class="barText" id="hudEnergyText">ENERGY 100/100 • FULL</div>
        </div>
      </div>
    </div>
  </div>
</div>

 

  <div id="chatDrawer">
    <div id="chatHeader">
      <div id="chatTitle">💬 Sohbet</div>
      <button id="chatToggle" type="button">Aç</button>
    </div>
    <div id="chatBody">
      <div id="chatMessages"></div>
      <div id="chatInputRow">
        <input id="chatInput" type="text" placeholder="Mesaj yaz..." />
        <button id="chatSend" type="button">Gönder</button>
      </div>
    </div>
  </div>

  <script>
    async function loadFirst(candidates) {
      let lastError = null;
      for (const path of candidates) {
        try {
          return await import(path);
        } catch (err) {
          lastError = err;
          console.warn("[TonCrime] yüklenemedi:", path, err);
        }
      }
      throw lastError || new Error("Hiçbir script yüklenemedi.");
    }

    function loadClassicFirst(candidates) {
      return new Promise((resolve, reject) => {
        let i = 0;

        const tryNext = () => {
          if (i >= candidates.length) {
            reject(new Error("Hiçbir classic script yüklenemedi."));
            return;
          }

          const src = candidates[i++];
          const s = document.createElement("script");
          s.src = src;
          s.defer = true;

          s.onload = () => {
            console.log("[TonCrime] classic script yüklendi:", src);
            resolve(src);
          };

          s.onerror = () => {
            console.warn("[TonCrime] classic script yüklenemedi:", src);
            s.remove();
            tryNext();
          };

          document.body.appendChild(s);
        };

        tryNext();
      });
    }

    function showBootError(text) {
      const el = document.createElement("div");
      el.style.cssText = `
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 10001;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(120,0,0,0.88);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.18);
        font-size: 13px;
        line-height: 1.4;
        backdrop-filter: blur(6px);
      `;
      el.textContent = text;
      document.body.appendChild(el);
    }

window.addEventListener("DOMContentLoaded", async () => {
  try {
    await loadClassicFirst([
      "./src/pvp.js",
      "./pvp.js"
    ]);

    await loadFirst([
      "./src/main.js",
      "./main.js"
    ]);

    window.TonCrimePVP?.boot?.();


      function showToast(msg) {
        let el = document.getElementById("pvpResultToast");
        if (!el) {
          el = document.createElement("div");
          el.id = "pvpResultToast";
          document.body.appendChild(el);
        }
        el.textContent = msg;
        el.style.opacity = "1";
        clearTimeout(el._t);
        el._t = setTimeout(() => { el.style.opacity = "0"; }, 1400);
      }

      function setPvpStatus(txt) {
        const status = document.getElementById("pvpStatus");
        if (status) status.textContent = "PvP • " + txt;
      }

      function setOpponent(name) {
        if (oppEl) oppEl.textContent = name || "—";
      }

      function spinner(on) {
        if (!spinEl) return;
        spinEl.classList.toggle("hidden", !on);
      }

      function openOverlay() { wrap.classList.add("open"); }
      function closeOverlay() {
        wrap.classList.remove("open");
        spinner(false);
        setOpponent("—");
        setPvpStatus("Hazır");
        window.TonCrimePVP?.stop?.();
        entering = false;
      }

      function getStore() { return window.tcStore || null; }
      function getState() { return getStore()?.get?.() || null; }
      function setState(patch) { getStore()?.set?.(patch); }

      function coinsOf(s) {
        const c = Number(s?.coins ?? NaN);
        if (Number.isFinite(c)) return c;
        const pc = Number(s?.player?.coins ?? NaN);
        if (Number.isFinite(pc)) return pc;
        const y = Number(s?.player?.yton ?? NaN);
        if (Number.isFinite(y)) return y;
        return 0;
      }

      function energyOf(s) {
        let e = Number(s?.player?.energy ?? NaN);
        if (Number.isFinite(e)) return e;

        e = Number(s?.energy ?? NaN);
        if (Number.isFinite(e)) return e;

        return 0;
      }

      function xpOf(s) {
        const x = Number(s?.player?.xp ?? NaN);
        return Number.isFinite(x) ? x : 0;
      }

      function ensureDefaultsOnce() {
        const st = getStore();
        if (!st) return false;
        const s = st.get() || {};
        if (s.__pvpDefaultsOk) return true;

        const p = s.player || {};
        const patch = { __pvpDefaultsOk: true };
        const pPatch = { ...p };
        let touched = false;

        if (s.coins == null && p.coins == null && p.yton == null) patch.coins = 100;
        if (pPatch.username == null) { pPatch.username = "Player"; touched = true; }
        if (pPatch.level == null) { pPatch.level = 1; touched = true; }
        if (pPatch.xp == null) { pPatch.xp = 0; touched = true; }
        if (pPatch.energy == null) { pPatch.energy = 10; touched = true; }
        if (pPatch.energyMax == null) { pPatch.energyMax = 10; touched = true; }
        if (pPatch.lastEnergyAt == null) { pPatch.lastEnergyAt = Date.now(); touched = true; }
        if (pPatch.energyIntervalMs == null) { pPatch.energyIntervalMs = 5 * 60 * 1000; touched = true; }

        if (touched) patch.player = pPatch;
        st.set(patch);
        return true;
      }

      function ensurePvpInit() {
        if (!window.TonCrimePVP) return false;
        if (ensurePvpInit._done) return true;

        window.TonCrimePVP.init({
          arenaId: "arena",
          statusId: "pvpStatus",
          enemyFillId: "enemyFill",
          meFillId: "meFill",
          enemyHpTextId: "enemyHpText",
          meHpTextId: "meHpText",
        });

        ensurePvpInit._done = true;
        return true;
      }

      function waitForPvp(maxMs = 2500) {
        return new Promise((resolve) => {
          const t0 = Date.now();
          (function tick() {
            if (window.TonCrimePVP) return resolve(true);
            if (Date.now() - t0 > maxMs) return resolve(false);
            setTimeout(tick, 50);
          })();
        });
      }

      function makeOpponentName() {
        const first = ["Mert","Kerem","Deniz","Arda","Sena","Ece","Yusuf","Atlas","Baran","Eren","Kaan","Efe","Cem","Poyraz"];
        const last  = ["Kara","Yılmaz","Demir","Kaya","Aslan","Koç","Çelik","Aydın","Şahin","Kaplan","Aksoy","Ersoy"];
        const nick  = ["Noir","Raven","Shadow","Kobra","Viper","Ghost","Prime","Nova","Reaper","Bane"];
        const mode = Math.random();
        if (mode < 0.55) return first[Math.floor(Math.random()*first.length)] + " " + last[Math.floor(Math.random()*last.length)];
        if (mode < 0.85) return nick[Math.floor(Math.random()*nick.length)] + "_" + (10 + Math.floor(Math.random()*89));
        return first[Math.floor(Math.random()*first.length)] + nick[Math.floor(Math.random()*nick.length)];
      }

      async function findOpponent() {
        spinner(true);
        setOpponent("aranıyor…");

        let dots = 0;
        setPvpStatus("Rakip aranıyor");
        const anim = setInterval(() => {
          dots = (dots + 1) % 4;
          setPvpStatus("Rakip aranıyor" + ".".repeat(dots));
        }, 300);

        const delay = 1200 + Math.floor(Math.random() * 1800);
        await new Promise(r => setTimeout(r, delay));

        clearInterval(anim);
        spinner(false);
        return { username: makeOpponentName(), isBot: true };
      }

      const ENERGY_COST = 10;

      function spendEnergy(s) {
        const p = s.player || {};
        setState({ player: { ...p, energy: Math.max(0, energyOf(s) - ENERGY_COST) } });
      }

      function spendPaidCoins(s) {
        setState({ coins: coinsOf(s) - 6 });
      }

      function rewardWinPaid() {
        const s = getState();
        if (!s?.player) return;
        setState({
          coins: coinsOf(s) + 10,
          player: { ...s.player, xp: xpOf(s) + 10 }
        });
      }

      function rewardWinAd() {
        const s = getState();
        if (!s?.player) return;
        setState({
          coins: coinsOf(s) + 3,
          player: { ...s.player, xp: xpOf(s) + 5 }
        });
      }

      function applyLose() {
        const s = getState();
        if (!s?.player) return;
        setState({
          coins: coinsOf(s) - 6,
          player: { ...s.player, xp: Math.max(0, xpOf(s) - 5) }
        });
      }

      function ensureLobbyUI() {
        if (document.getElementById("pvpLobby")) return;

        const header = document.getElementById("pvpHeader");
        if (!header) return;

        const lobby = document.createElement("div");
        lobby.id = "pvpLobby";
        lobby.style.display = "grid";
        lobby.style.gridTemplateColumns = "1fr 1fr";
        lobby.style.gap = "8px";
        lobby.style.padding = "10px";
        lobby.style.borderBottom = "1px solid rgba(255,255,255,0.10)";

        lobby.innerHTML = `
          <button class="pvpBtn" id="pvpEnterAd" type="button">🎥 Reklam İzle Gir</button>
          <button class="pvpBtn" id="pvpEnterPaid" type="button">🪙 6 Coin ile Gir</button>
          <button class="pvpBtn" id="pvpLeaderboard" type="button">🏆 Leaderboard</button>
          <button class="pvpBtn" id="pvpTournament" type="button">🎯 Turnuva</button>
        `;

        header.parentNode.insertBefore(lobby, header.nextSibling);

        btnStart.style.display = "none";
        btnStop.style.display  = "none";
      }

      function showLobby() {
        ensureLobbyUI();
        const lobby = document.getElementById("pvpLobby");
        if (lobby) lobby.style.display = "grid";
        setPvpStatus("Lobi");
        spinner(false);
        setOpponent("—");
      }

      function hideLobby() {
        const lobby = document.getElementById("pvpLobby");
        if (lobby) lobby.style.display = "none";
      }

      let entering = false;
      let entryMode = null;

      async function startMatch(mode) {
        if (entering) return;
        entering = true;
        entryMode = mode;

        try {
          openOverlay();
          showLobby();
          hideLobby();

          if (!getStore()) {
            showToast("Store yok");
            setPvpStatus("STORE YOK");
            return;
          }

          ensureDefaultsOnce();

          const ok = await waitForPvp(3000);
          if (!ok) {
            showToast("pvp.js yüklenmedi");
            setPvpStatus("PVP YOK");
            return;
          }

          ensurePvpInit();

          const s = getState();
          const y = coinsOf(s);
          const e = energyOf(s);

          if (e < ENERGY_COST) {
            setPvpStatus("Yetersiz Enerji");
            showToast(`Yetersiz enerji (${e}/${ENERGY_COST})`);
            showLobby();
            return;
          }

          if (mode === "paid" && y < 6) {
            setPvpStatus("Yetersiz Coin");
            showToast(`Yetersiz coin (Coin:${y})`);
            showLobby();
            return;
          }

          if (mode === "ad") {
            setPvpStatus("Reklam izleniyor...");
            spinner(true);
            await new Promise(r => setTimeout(r, 1200));
            spinner(false);
          }

          const opp = await findOpponent();
          setOpponent(opp.username);
          setPvpStatus("Rakip bulundu");

          await new Promise(r => setTimeout(r, 500));

          const s2 = getState();
          spendEnergy(s2);
          if (mode === "paid") spendPaidCoins(s2);

          window.TonCrimePVP.setOpponent?.(opp);
          window.TonCrimePVP.reset?.();
          window.TonCrimePVP.start?.();

          setPvpStatus("Başladı");
        } finally {
          entering = false;
        }
      }

      fab.onclick = () => {
        openOverlay();
        ensureDefaultsOnce();
        ensureLobbyUI();
        showLobby();
      };

      window.addEventListener("tc:openPvp", () => {
        openOverlay();
        ensureDefaultsOnce();
        ensureLobbyUI();
        showLobby();
      });

      btnReset.onclick = () => {
        ensurePvpInit();
        window.TonCrimePVP?.reset?.();
        setOpponent("—");
        spinner(false);
        setPvpStatus("Hazır");
        showLobby();
      };

      btnStop.onclick = () => {
        window.TonCrimePVP?.stop?.();
        setPvpStatus("Durduruldu");
        showLobby();
      };

      document.body.addEventListener("click", (e) => {
        const id = e.target?.id;
        if (!id) return;

        if (id === "pvpEnterAd") startMatch("ad");
        if (id === "pvpEnterPaid") startMatch("paid");
        if (id === "pvpLeaderboard") {
          showToast("Leaderboard yakında");
          setPvpStatus("Leaderboard");
        }
        if (id === "pvpTournament") {
          showToast("Turnuva yakında");
          setPvpStatus("Turnuva");
        }
      });

      window.addEventListener("tc:pvp:win", () => {
        if (entryMode === "ad") rewardWinAd();
        else rewardWinPaid();

        showToast("Kazandın!");
        setPvpStatus("Bitti");
        showLobby();
      });

      window.addEventListener("tc:pvp:lose", () => {
        applyLose();
        showToast("Kaybettin!");
        setPvpStatus("Bitti");
        showLobby();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeOverlay();
      });

      ensureDefaultsOnce();
      ensureLobbyUI();
      setPvpStatus("Hazır");
      setOpponent("—");
      spinner(false);
    }
  </script>
</body>
</html>
