<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>TonCrime</title>

  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <script id="tc-richads-sdk" src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
  <script>
    (function () {
      const RICH_ADS_SDK_URL = "https://richinfo.co/richpartners/telegram/js/tg-ob.js";
      const richAdsConfig = {
        pubId: "1006898",
        appId: "6869",
        debug: /(^localhost$)|(^127\.)|(^192\.168\.)|(^10\.)/i.test(location.hostname),
      };
      window.tcRichAdsConfig = richAdsConfig;

      const supportedMethods = [
        "triggerInterstitialVideo",
        "triggerRewardedVideo",
        "showRewardedVideo",
        "showRewarded",
        "showVideo",
      ];

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function hasRichAdsMethod(controller) {
        return supportedMethods.some((methodName) => typeof controller?.[methodName] === "function");
      }

      function getTelegramSnapshot() {
        const tg = window.Telegram?.WebApp || null;
        const user = tg?.initDataUnsafe?.user || null;
        return {
          tg,
          user,
          userId: user?.id != null ? String(user.id) : "",
          initData: String(tg?.initData || ""),
        };
      }

      window.tcWaitForTelegramMiniAppReady = async function tcWaitForTelegramMiniAppReady(timeoutMs = 4500) {
        const startedAt = Date.now();
        while (Date.now() - startedAt < timeoutMs) {
          const snapshot = getTelegramSnapshot();
          try {
            snapshot.tg?.ready?.();
          } catch (_) {}

          if (snapshot.user && snapshot.initData) {
            return snapshot;
          }

          await sleep(120);
        }

        return getTelegramSnapshot();
      };

      window.tcWaitForRichAdsSdk = async function tcWaitForRichAdsSdk(timeoutMs = 4500) {
        const startedAt = Date.now();
        while (Date.now() - startedAt < timeoutMs) {
          if (typeof window.TelegramAdsController === "function") {
            return window.TelegramAdsController;
          }
          await sleep(120);
        }
        return typeof window.TelegramAdsController === "function" ? window.TelegramAdsController : null;
      };

      window.tcReloadRichAdsSdk = async function tcReloadRichAdsSdk(timeoutMs = 5000) {
        try {
          const current = document.getElementById("tc-richads-sdk");
          if (current?.parentNode) current.parentNode.removeChild(current);
        } catch (_) {}

        try {
          delete window.TelegramAdsController;
        } catch (_) {
          window.TelegramAdsController = undefined;
        }

        const script = document.createElement("script");
        script.id = "tc-richads-sdk";
        script.src = `${RICH_ADS_SDK_URL}?v=${Date.now()}`;

        const loaded = new Promise((resolve) => {
          script.onload = () => resolve(true);
          script.onerror = () => resolve(false);
        });

        document.head.appendChild(script);
        const ok = await Promise.race([
          loaded,
          new Promise((resolve) => setTimeout(() => resolve(false), timeoutMs)),
        ]);

        if (!ok) return null;
        return window.tcWaitForRichAdsSdk(timeoutMs);
      };

      let resolveReady = function () {};
      window.tcRichAdsReady = new Promise((resolve) => {
        resolveReady = resolve;
      });

      window.tcCreateRichAdsController = async function tcCreateRichAdsController(options = {}) {
        const forceFresh =
          typeof options === "boolean"
            ? options
            : !!(options && typeof options === "object" && options.forceFresh);

        if (!forceFresh && hasRichAdsMethod(window.tcRichAdsController)) {
          return window.tcRichAdsController;
        }

        try {
          const snapshot = await window.tcWaitForTelegramMiniAppReady(4500);
          const ControllerCtor = await window.tcWaitForRichAdsSdk(4500);
          if (typeof ControllerCtor !== "function") {
            return null;
          }

          if (forceFresh) {
            window.tcRichAdsController = null;
            window.tcRichAdsControllerMeta = null;
          }

          const controller = new ControllerCtor();
          const initResult = controller.initialize?.(richAdsConfig);
          if (initResult && typeof initResult.then === "function") {
            await initResult;
          }

          if (!hasRichAdsMethod(controller)) {
            return null;
          }

          window.tcRichAdsController = controller;
          window.tcRichAdsControllerMeta = {
            createdAt: Date.now(),
            userId: snapshot.userId,
            initDataLength: snapshot.initData.length,
          };
          return controller;
        } catch (error) {
          console.error("[TonCrime] RichAds init failed:", error);
          return null;
        }
      };

      window.addEventListener(
        "load",
        () => {
          window.tcCreateRichAdsController()
            .then((controller) => resolveReady(controller || null))
            .catch((error) => {
              console.error("[TonCrime] RichAds bootstrap failed:", error);
              resolveReady(null);
            });
        },
        { once: true }
      );
    })();
  </script>

  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="shortcut icon" type="image/png" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/favicon.png" />

  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --tc-viewport-width: 100vw;
      --tc-viewport-height: 100vh;
      --tc-app-width: 100vw;
      --tc-app-height: 100vh;
      --tc-app-left: 0px;
      --tc-app-top: 0px;
      --tc-app-radius: 0px;
      --tc-app-shadow: none;
      --tc-shell-opacity: 0;
      --tc-canvas-opacity: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: var(--tc-viewport-height);
      width: var(--tc-viewport-width);
      min-height: var(--tc-viewport-height);
      min-width: var(--tc-viewport-width);
      background:
        radial-gradient(circle at top, rgba(229, 168, 72, 0.14), transparent 36%),
        linear-gradient(180deg, #161018 0%, #0c0c11 52%, #08090d 100%);
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      height: var(--tc-viewport-height);
      width: var(--tc-viewport-width);
    }

    body::before {
      content: "";
      position: fixed;
      left: calc(var(--tc-app-left) - 10px);
      top: calc(var(--tc-app-top) - 10px);
      width: calc(var(--tc-app-width) + 20px);
      height: calc(var(--tc-app-height) + 20px);
      border-radius: calc(var(--tc-app-radius) + 12px);
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(12, 12, 16, 0.92);
      box-shadow: 0 32px 100px rgba(0,0,0,0.46);
      opacity: var(--tc-shell-opacity);
      pointer-events: none;
      z-index: 0;
    }

    #game {
      position: fixed;
      left: var(--tc-app-left);
      top: var(--tc-app-top);
      width: var(--tc-app-width);
      height: var(--tc-app-height);
      display: block;
      z-index: 1;
      border-radius: var(--tc-app-radius);
      box-shadow: var(--tc-app-shadow);
      background: #08090d;
      opacity: var(--tc-canvas-opacity);
      transition: opacity 160ms ease;
    }

    #safe {
      position: fixed;
      left: var(--sal);
      top: var(--sat);
      right: var(--sar);
      bottom: var(--sab);
      pointer-events: none;
      z-index: 2;
    }

    /* ===== CHAT ===== */
    #chatDrawer {
      position: fixed;
      left: var(--sal);
      right: var(--sar);
      bottom: var(--sab);
      height: min(42vh, 360px);
      transform: translateY(calc(100% - 44px));
      transition: transform 220ms ease;
      z-index: 9999;
      pointer-events: auto;
    }

    #chatDrawer, #chatDrawer * {
      touch-action: auto;
      -webkit-user-select: none;
      user-select: none;
    }

    #chatDrawer.open {
      transform: translateY(0);
    }

    #chatHeader {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: rgba(0,0,0,0.72);
      border-top: 1px solid rgba(255,255,255,0.14);
      border-left: 1px solid rgba(255,255,255,0.10);
      border-right: 1px solid rgba(255,255,255,0.10);
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
      backdrop-filter: blur(6px);
    }

    #chatTitle {
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chatToggle {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      border-radius: 10px;
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
      cursor: pointer;
    }

    #chatBody {
      height: calc(100% - 44px);
      background: rgba(0,0,0,0.62);
      border-left: 1px solid rgba(255,255,255,0.10);
      border-right: 1px solid rgba(255,255,255,0.10);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      border-bottom-left-radius: 14px;
      border-bottom-right-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(6px);
    }

    #chatMessages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 6px;
    }

    .msg {
      margin: 6px 0;
      display: flex;
      gap: 8px;
      align-items: baseline;
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      line-height: 1.25;
      word-break: break-word;
    }

    .msg .meta {
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      min-width: 56px;
    }

    #chatInputRow {
      display: flex;
      gap: 8px;
      padding: 8px;
      border-top: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.30);
    }

    #chatInput {
      flex: 1;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 0 10px;
      outline: none;
      font-size: 13px;
      user-select: text;
      -webkit-user-select: text;
    }

    #chatSend {
      width: 74px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      cursor: pointer;
    }
  </style>

  <link rel="stylesheet" href="./src/ui/Hud.css" />
</head>

<body>
  <canvas id="game"></canvas>

  <div id="safe"></div>

  <div id="hudTop">
    <div id="hudShell" class="hudPanel">
      <div id="hudRow">
        <div id="hudLeft">
          <div id="hudIdentity">
            <div id="hudAvatarWrap">
              <div id="hudAvatar">
                <img id="hudAvatarImg" alt="avatar" />
                <div id="hudAvatarFallback">P</div>
              </div>
              <div id="hudOnlineBadge" title="Online"></div>
              <div id="hudPremiumBadge" title="Premium">★</div>
            </div>

            <div id="hudIdentityText">
              <div class="line1" id="hudUsername">Player</div>
              <div class="line2">
                <span class="hudMiniIcon">Y</span>
                <span id="hudCoins">YTON 0</span>
              </div>
              <div class="line3">
                <span class="hudMiniIcon">⚔</span>
                <span id="hudWeaponName">Silah Yok</span>
                <small id="hudWeaponBonus"></small>
              </div>
            </div>
          </div>
        </div>

        <div id="hudCenter">
          <img id="hudLogo" src="./src/assets/logo.png" alt="TonCrime" />

        <div id="hudRight">
          <div class="bar">
            <div class="barFill" id="hudXpFill"></div>
            <div class="barText" id="hudXpText">LVL 1 • 0/100</div>

          <div class="bar">
            <div class="barFill" id="hudEnergyFill"></div>

      </div>
    </div>
  </div>

  <div id="chatDrawer">
    <div id="chatHeader">
      <div id="chatTitle">💬 Sohbet</div>
      <button id="chatToggle" type="button">Aç</button>
    </div>
    <div id="chatBody">
      <div id="chatMessages"></div>
      <div id="chatInputRow">
        <input id="chatInput" type="text" placeholder="Mesaj yaz..." />
        <button id="chatSend" type="button">Gönder</button>
      </div>
    </div>
  </div>

  <script>
    async function loadFirst(candidates) {
      let lastError = null;
      for (const path of candidates) {
        try {
          return await import(path);
        } catch (err) {
          lastError = err;
          console.warn("[TonCrime] yüklenemedi:", path, err);
        }
      }
      throw lastError || new Error("Hiçbir script yüklenemedi.");
    }

    function loadClassicFirst(candidates) {
      return new Promise((resolve, reject) => {
        let i = 0;

        const tryNext = () => {
          if (i >= candidates.length) {
            reject(new Error("Hiçbir classic script yüklenemedi."));
            return;
          }

          const src = candidates[i++];
          const s = document.createElement("script");
          s.src = src;
          s.defer = true;

          s.onload = () => {
            console.log("[TonCrime] classic script yüklendi:", src);
            resolve(src);
          };

          s.onerror = () => {
            console.warn("[TonCrime] classic script yüklenemedi:", src);
            s.remove();
            tryNext();
          };

          document.body.appendChild(s);
        };

        tryNext();
      });
    }

    function showBootError(text) {
      const el = document.createElement("div");
      el.style.cssText = `
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 10001;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(120,0,0,0.88);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.18);
        font-size: 13px;
        line-height: 1.4;
        backdrop-filter: blur(6px);
      `;
      el.textContent = text;
      document.body.appendChild(el);
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        await loadClassicFirst([
          "./src/pvp.js?v=20260331-2",
          "./pvp.js"
        ]);

        await loadFirst([
          "./src/main.js?v=20260403-7",
          "./main.js"
        ]);

        window.TonCrimePVP?.boot?.();
      } catch (err) {
        console.error(err);
        showBootError("Oyun dosyaları yüklenemedi. main.js / pvp.js yolu veya deploy klasör yapısı hatalı.");
      }
    });
  </script>
</body>
</html>
